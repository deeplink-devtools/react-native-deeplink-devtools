name: Test rndl Action
on: [pull_request]
permissions:
  contents: read
  security-events: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: deeplink-devtools/react-native-deeplink-devtools/packages/action@main
        with:
          domain: example-broken-domain.invalid  # a domain that will 404 (seeded failure)
          app-dir: example-expo-router/src/app   # clone this repo or your own
