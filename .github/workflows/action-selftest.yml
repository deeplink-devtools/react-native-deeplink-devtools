name: Action self-test

# Proves packages/action/action.yml executes in a real runner by running it against
# the example app in routes-only mode (no domain, so no network). The domain-validate
# path and its annotations are covered hermetically by packages/action/annotate.test.mjs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Must run before setup-node so its yarn cache detection uses Yarn 4, not the image's Yarn 1.
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      # Build so packages/cli/dist/cli.js exists for the local CLI override below.
      - run: yarn build

      - name: Run the action against the example app (routes-only)
        uses: ./packages/action
        with:
          app-dir: example-expo-router/src/app
          cli-command: node ${{ github.workspace }}/packages/cli/dist/cli.js
