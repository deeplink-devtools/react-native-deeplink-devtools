name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # Must run before setup-node so its yarn cache detection uses Yarn 4, not the image's Yarn 1.
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - run: yarn install --immutable

      # Build first: dependent packages typecheck against the .d.ts files core emits.
      - run: yarn build

      - run: yarn typecheck

      - run: yarn lint

      - run: yarn format:check

      - run: yarn test

      # Two production Metro builds proving @deeplink-devtools/runtime adds <1KB to app bundles.
      - run: yarn assert:runtime-noop

      # Published-surface checks: package.json exports and packed files
      # (publint), and resolution of the published types under every
      # moduleResolution mode (attw). Run per package from the root via npx:
      # publint/attw are root devDeps and are not on a workspace's own exec PATH
      # (Yarn 4). The CLI is bin-only and intentionally ships no types, so it
      # gets publint but not attw.
      - name: Lint the published package surface
        run: |
          for p in core adapter-expo-router adapter-react-navigation runtime typegen; do
            npx publint "packages/$p"
            npx attw --pack "packages/$p"
          done
          npx publint packages/cli

      - run: yarn publish:dry
