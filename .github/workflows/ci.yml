name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # Must run before setup-node so its yarn cache detection uses Yarn 4, not the image's Yarn 1.
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - run: yarn install --immutable

      # Build first: dependent packages typecheck against the .d.ts files core emits.
      - run: yarn build

      - run: yarn typecheck

      - run: yarn lint

      - run: yarn format:check

      - run: yarn test

      # Two production Metro builds proving @deeplink-devtools/runtime adds <1KB to app bundles.
      - run: yarn assert:runtime-noop

      - run: yarn publish:dry
