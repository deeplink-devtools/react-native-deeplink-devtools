name: Feature request
description: Propose an addition or change
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        This project follows a roadmap. Note: attribution/marketing links and
        push-notification deep links are out of scope (see CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Describe the problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: 'What you would like to happen: CLI flag, API shape, behavior'
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: 'None'
